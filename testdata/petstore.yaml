openapi: 3.0.3
info:
  title: Pet Store
  version: 2.0.0
paths:
  /pets:
    get:
      operationId: listPets
      tags: [pets]
      summary: List pets
      parameters:
        - name: limit
          in: query
          required: false
          schema: {type: integer, format: int32}
      responses:
        '200':
          description: pets
          content:
            application/json:
              schema: {$ref: '#/components/schemas/PetList'}
    post:
      operationId: createPet
      tags: [pets]
      summary: Create a pet
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/Pet'}
      responses:
        '201':
          description: created
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Pet'}
  /pets/{petId}:
    get:
      operationId: getPet
      tags: [pets]
      summary: Get a pet by id
      parameters:
        - name: petId
          in: path
          required: true
          schema: {type: string}
      responses:
        '200':
          description: pet
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Pet'}
  /stores/{storeId}/inventory:
    get:
      operationId: getInventory
      tags: [store]
      summary: Inventory counts by sku
      parameters:
        - name: storeId
          in: path
          required: true
          schema: {type: string}
      responses:
        '200':
          description: inventory
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Inventory'}
components:
  schemas:
    Pet:
      type: object
      required: [id, name]
      properties:
        id: {type: integer, format: int64}
        name: {type: string}
        tag: {type: string}
        price: {type: number, format: double}
    PetList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: {$ref: '#/components/schemas/Pet'}
        nextPage: {type: string}
    Inventory:
      type: object
      required: [counts]
      properties:
        counts:
          type: object
          additionalProperties: {type: integer, format: int32}
